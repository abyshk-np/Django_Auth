<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth</title>
</head>
<body>
    <h1>Auth Practice</h1>

    {% if messages %}
    <ul>
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    {% if user.is_authenticated %}
    <p>Logged in as {{ user.username }} | <a href="{% url 'logout' %}">LOGOUT</a></p>
    {% else %}
    <p><a href="{% url 'login' %}">LOGIN</a> | <a href="{% url 'register' %}">SIGN UP</a></p>
    {% endif %}

    <hr>
    {% block content %}
    {% endblock %}
</body>
</html>
